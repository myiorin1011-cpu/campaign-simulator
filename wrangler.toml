name = "campaign-simulator"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

# Vite のビルド成果物(dist)を静的アセットとして配信（SPA対応）
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

# 共有データ用KV（Cloudflareダッシュボードで作成後、id を設定してコメントを外す）
# [[kv_namespaces]]
# binding = "PAIGNER_KV"
# id = "<ここにKV namespace IDを貼る>"
